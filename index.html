<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- ✅ Primary SEO title -->
  <title>The Messed Up Game™ | Live Hosted Social Party Game</title>

  <!-- ✅ Description (helps Google + shows in search results) -->
  <meta
    name="description"
    content="The Messed Up Game™ (also known as Messed Up Game) is a live hosted social party game created by Tom Butler—perfect for apartment clubhouses, community centers, senior homes, and events."
  />

  <!-- ✅ Canonical (tells Google the official URL) -->
  <link rel="canonical" href="https://messedupgame.com/" />

  <!-- ✅ Open Graph / Twitter (social previews) -->
  <meta property="og:title" content="The Messed Up Game™" />
  <meta
    property="og:description"
    content="A live hosted social party game (also known as Messed Up Game). Book a game night for your clubhouse, community center, or senior home."
  />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://messedupgame.com/" />

  <!-- Social preview image (place og-image.jpg in /public) -->
  <meta property="og:image" content="/og-image.jpg" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="/og-image.jpg" />

  <!-- ✅ Structured Data (teaches Google your official name + alternate name) -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Game",
      "name": "The Messed Up Game",
      "alternateName": ["Messed Up Game", "The Messed Up Game™"],
      "url": "https://messedupgame.com/",
      "creator": { "@type": "Person", "name": "Tom Butler" }
    }
  </script>

  <!-- AdSense global tag -->
  <script
    async
    src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1002132494100386"
    crossorigin="anonymous"
  ></script>
</head>
